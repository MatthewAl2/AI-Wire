name: Refresh AI Wire

on:
  schedule:
    - cron: '0 13 * * *'   # 13:00 UTC daily - adjust as you like
  workflow_dispatch:        # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-llama3.2-3b

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama server
        run: |
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:11434/api/version && break
            sleep 1
          done

      - name: Pull summarization model
        run: ollama pull llama3.2:3b

      - name: Run AI Wire pipeline
        run: python -m aiwire.main

      - name: Commit and push updated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs data/news.json
          git diff --cached --quiet || git commit -m "Automated daily refresh"
          git push
